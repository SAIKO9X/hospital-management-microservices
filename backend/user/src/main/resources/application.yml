server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful # aguarda requests terminarem antes de matar o processo

services:
  profile:
    base-url: "${PROFILE_URI:http://localhost:8082}"

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s # tempo máximo de espera
  config:
    import: "optional:classpath:common-application.yml"
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ms_user_db}
    username: ${DB_USER:mysql_user}
    password: ${DB_PASSWORD:mysql_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
    cache:
      type: redis
      redis:
        time-to-live: 600000 # 10 minutos
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

application:
  rabbitmq:
    exchange: internal.exchange
    user-created-routing-key: user.event.created
    user-updated-routing-key: user.event.updated
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    hostname: ${HOSTNAME:localhost}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://zipkin:9411/api/v2/spans"

app:
  security:
    encryption-key: ${ENCRYPTION_KEY:ThisIsAFixedKeyForEncryption32Ch}