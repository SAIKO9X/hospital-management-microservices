sonar.projectKey=SAIKO9X_microservice-hms-project
sonar.organization=saiko-projects
sonar.projectName=HMS Backend - Hospital Management System

# Ignorar arquivos SQL de migração/seed do Flyway (Não contêm lógica testável)
sonar.exclusions=**/src/main/resources/db/migration/**/*.sql

# --- CONFIGURAÇÕES DE COBERTURA DE TESTES ---
# Motivo da exclusão: O SonarCloud (plano gratuito) utiliza o Quality Gate padrão "Sonar way", 
# que exige estritamente 80% de cobertura de testes em códigos novos (New Code).
# Como o plano gratuito não permite editar essa política, a falta de testes faria 
# com que o pipeline de CI/CD no GitHub Actions falhasse em todo Pull Request.
# 
# Nota: As verificações de Duplicação de Código, Code Smells e Vulnerabilidades continuam ativas.
sonar.coverage.exclusions=**/*