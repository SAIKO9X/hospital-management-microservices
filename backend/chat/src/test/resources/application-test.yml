spring:
  datasource:
    url: jdbc:h2:mem:chatdb;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  cloud:
    discovery:
      enabled: false
  cache:
    type: none
  rabbitmq:
    listener:
      simple:
        auto-startup: false

eureka:
  client:
    enabled: false

application:
  security:
    jwt:
      secret-key: c29tZVN1cGVyU2VjcmV0S2V5Rm9yVGVzdHNPTkxZMTIzNDU2Nzg=
      expiration: 3600000
