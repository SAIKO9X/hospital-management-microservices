spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: false
  cloud:
    discovery:
      enabled: false
  cache:
    type: redis
    redis:
      time-to-live: 600000
  data:
    redis:
      repositories:
        enabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false

eureka:
  client:
    enabled: false

application:
  security:
    jwt:
      secret-key: c29tZVN1cGVyU2VjcmV0S2V5Rm9yVGVzdHNPTkxZMTIzNDU2Nzg=
      expiration: 3600000
